version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: ${APP_NAME}_backend
    ports:
      - "${BACKEND_PORT}:8000"
    volumes:
      - ${APP_PATH}:/app
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - APP_NAME=${APP_NAME}
      - APP_PATH=/app
      - GITHUB_SECRET=${GITHUB_SECRET}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: ${APP_NAME}_frontend
    ports:
      - "${FRONTEND_PORT}:3000"
    environment:
      - NEXT_PUBLIC_BASE_PATH=/${APP_NAME}
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: ${APP_NAME}_nginx
    ports:
      - "${NGINX_PORT}:80"
      - "443:443"
    volumes:
    - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    - /etc/letsencrypt:/etc/letsencrypt  # SSL certificates
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
